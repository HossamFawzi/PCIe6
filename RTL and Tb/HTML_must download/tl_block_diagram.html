<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCIe Gen6 — Transaction Layer Block Diagram</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap');

:root {
  --bg:       #020409;
  --surface:  #060b12;
  --panel:    #08111d;
  --border:   #0f1e30;
  --border2:  #162840;

  --tx:    #00b4d8;
  --rx:    #e63946;
  --sup:   #52b788;
  --gen6:  #ffd60a;
  --err:   #ff6b6b;
  --ctrl:  #c77dff;

  --wire-data:  #00b4d8;
  --wire-ctrl:  #c77dff;
  --wire-err:   #ff6b6b;
  --wire-fc:    #52b788;
  --wire-tag:   #ffd60a;

  --text:  #7fa8c4;
  --bright:#d0e8f8;
  --dim:   #1e3550;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* grid bg */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,180,216,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,180,216,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridmove 40s linear infinite;
  pointer-events: none;
}
@keyframes gridmove { to { background-position: 40px 40px; } }

.page { position: relative; z-index: 1; }

/* ─── HEADER ─── */
header {
  padding: 28px 32px 20px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(0,180,216,0.04) 0%, transparent 100%);
  display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
header h1 {
  font-family: 'IBM Plex Mono', monospace;
  font-size: clamp(1rem, 2.5vw, 1.5rem);
  font-weight: 700;
  color: var(--bright);
  letter-spacing: -0.02em;
  line-height: 1.2;
}
header h1 span { color: var(--tx); }
.hdr-sub { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--dim); margin-top: 4px; }

.legend {
  display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
}
.leg { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; font-family: 'IBM Plex Mono', monospace; }
.leg-dot { width: 8px; height: 8px; border-radius: 1px; flex-shrink: 0; }
.leg-line { width: 24px; height: 2px; flex-shrink: 0; }

/* ─── CONTROLS ─── */
.controls {
  display: flex; gap: 8px; flex-wrap: wrap;
  padding: 12px 32px; border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.ctrl-btn {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
  padding: 5px 14px; border: 1px solid var(--border2);
  background: transparent; color: var(--text); cursor: pointer;
  transition: all 0.15s; letter-spacing: 0.06em;
}
.ctrl-btn:hover, .ctrl-btn.active { color: var(--bright); border-color: var(--tx); background: rgba(0,180,216,0.08); }
.ctrl-btn.active { color: var(--tx); }

/* ─── DIAGRAM CANVAS ─── */
.canvas-wrap {
  padding: 24px 20px;
  overflow-x: auto;
  min-height: 600px;
}

svg#diagram {
  display: block;
  min-width: 1400px;
  width: 100%;
  height: auto;
  overflow: visible;
}

/* SVG styles */
.layer-bg { fill: rgba(6,11,18,0.9); }
.layer-border-tx  { stroke: rgba(0,180,216,0.25); fill: rgba(0,180,216,0.03); }
.layer-border-rx  { stroke: rgba(230,57,70,0.25);  fill: rgba(230,57,70,0.03); }
.layer-border-sup { stroke: rgba(82,183,136,0.25); fill: rgba(82,183,136,0.03); }

.mod-box {
  cursor: pointer;
  transition: filter 0.2s;
}
.mod-box:hover { filter: brightness(1.35); }
.mod-box:hover .mod-body-rect { stroke-width: 1.5; }

.mod-body-rect { transition: stroke-width 0.15s; }

.mod-title {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
  font-size: 9.5px;
  fill: #d0e8f8;
  dominant-baseline: central;
  text-anchor: middle;
}
.mod-tag {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 7.5px;
  dominant-baseline: central;
  text-anchor: middle;
}
.mod-io {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 6.5px;
  dominant-baseline: central;
}

/* Arrows / wires */
.wire { fill: none; stroke-width: 1.5; marker-end: url(#arrowhead); }
.wire-data { stroke: var(--wire-data); }
.wire-ctrl { stroke: var(--wire-ctrl); }
.wire-err  { stroke: var(--wire-err); }
.wire-fc   { stroke: var(--wire-fc); }
.wire-tag  { stroke: var(--wire-tag); }
.wire-dll  { stroke: #888; stroke-dasharray: 4,3; }
.wire-user { stroke: #aaa; }

.wire-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 6px;
  fill: #2a4a6a;
}
.wire-label-bright { fill: #3a6a8a; }

/* Port dots */
.port-out { fill: var(--tx); }
.port-in  { fill: var(--rx); }
.port-ctrl { fill: var(--ctrl); }

/* Section labels */
.section-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

/* ─── DETAIL PANEL ─── */
#detail-panel {
  position: fixed; right: 0; top: 0; bottom: 0; width: 360px;
  background: var(--panel);
  border-left: 1px solid var(--border2);
  border-left-width: 2px;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  z-index: 200; overflow-y: auto;
  display: flex; flex-direction: column;
}
#detail-panel.open { transform: translateX(0); }
#detail-panel .dp-header {
  padding: 20px; border-bottom: 1px solid var(--border2);
  background: rgba(0,0,0,0.3); flex-shrink: 0; position: sticky; top: 0; z-index: 1;
}
#detail-panel .dp-header h2 {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; font-weight: 700; color: var(--bright);
  line-height: 1.3; margin-bottom: 4px;
}
#detail-panel .dp-tag {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em;
}
#detail-panel .dp-body { padding: 16px; flex: 1; }
.dp-close {
  float: right; cursor: pointer; color: var(--dim); font-size: 1.2rem; line-height: 1;
  background: none; border: none; padding: 0; margin-left: 8px;
}
.dp-close:hover { color: var(--bright); }

.dp-section {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.55rem;
  letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim);
  margin: 14px 0 6px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.dp-note {
  font-size: 0.72rem; line-height: 1.65; color: var(--text);
  border-left: 2px solid var(--border2); padding-left: 10px; margin-bottom: 12px;
}
.io-entry {
  display: grid; grid-template-columns: 1fr 48px;
  gap: 4px; padding: 4px 6px; border-radius: 2px; margin-bottom: 2px;
  background: rgba(255,255,255,0.02); font-family: 'IBM Plex Mono', monospace;
}
.io-entry:hover { background: rgba(255,255,255,0.04); }
.io-sig { font-size: 0.62rem; color: var(--bright); }
.io-bits { font-size: 0.58rem; color: var(--dim); text-align: right; }
.io-in-marker  { border-left: 2px solid var(--tx); }
.io-out-marker { border-left: 2px solid var(--rx); }
.dp-badge {
  display: inline-block; font-family: 'IBM Plex Mono', monospace;
  font-size: 0.55rem; padding: 2px 7px; border: 1px solid;
  margin-right: 5px; margin-bottom: 4px;
}
.flow-entry {
  font-size: 0.68rem; padding: 5px 0; border-bottom: 1px solid var(--border);
  color: var(--text); font-family: 'IBM Plex Mono', monospace;
}
.flow-arrow { color: var(--tx); margin: 0 6px; }
</style>
</head>
<body>
<div class="page">

<!-- HEADER -->
<header>
  <div>
    <h1>PCIe Gen6 — <span>Transaction Layer</span> Block Diagram</h1>
    <div class="hdr-sub">// 22 RTL blocks · full I/O signal flow · click any block for details</div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--tx)"></div>TX Path</div>
    <div class="leg"><div class="leg-dot" style="background:var(--rx)"></div>RX Path</div>
    <div class="leg"><div class="leg-dot" style="background:var(--sup)"></div>Support</div>
    <div class="leg"><div class="leg-dot" style="background:var(--gen6)"></div>Gen6 New</div>
    <div class="leg" style="margin-left:8px">
      <div class="leg-line" style="background:var(--wire-data)"></div>Data
    </div>
    <div class="leg">
      <div class="leg-line" style="background:var(--wire-fc)"></div>FC/Credit
    </div>
    <div class="leg">
      <div class="leg-line" style="background:var(--wire-ctrl)"></div>Control
    </div>
    <div class="leg">
      <div class="leg-line" style="background:var(--wire-err)"></div>Error
    </div>
    <div class="leg">
      <div class="leg-line" style="background:var(--wire-tag)"></div>Tag
    </div>
  </div>
</header>

<!-- CONTROLS -->
<div class="controls">
  <button class="ctrl-btn active" onclick="toggleWires('all',this)">Show All Wires</button>
  <button class="ctrl-btn" onclick="toggleWires('data',this)">Data Only</button>
  <button class="ctrl-btn" onclick="toggleWires('fc',this)">FC/Credits Only</button>
  <button class="ctrl-btn" onclick="toggleWires('ctrl',this)">Control Only</button>
  <button class="ctrl-btn" onclick="toggleWires('err',this)">Error Only</button>
  <button class="ctrl-btn" onclick="toggleWires('tag',this)">Tag Only</button>
  <button class="ctrl-btn" style="margin-left:auto" onclick="resetHighlight()">Reset Highlight</button>
</div>

<!-- DIAGRAM -->
<div class="canvas-wrap">
<svg id="diagram" viewBox="0 0 1500 1020" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Arrow markers -->
  <marker id="arrowhead" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="currentColor" class="arrow-fill"/>
  </marker>
  <marker id="arr-data" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#00b4d8"/>
  </marker>
  <marker id="arr-ctrl" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#c77dff"/>
  </marker>
  <marker id="arr-err" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#ff6b6b"/>
  </marker>
  <marker id="arr-fc" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#52b788"/>
  </marker>
  <marker id="arr-tag" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#ffd60a"/>
  </marker>
  <marker id="arr-dll" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
    <path d="M0,0 L6,3 L0,6 Z" fill="#888"/>
  </marker>
  <!-- Glow filter -->
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-strong">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- ══════════════════════════════════════════════════════ -->
<!--  BACKGROUND LAYER REGIONS                            -->
<!-- ══════════════════════════════════════════════════════ -->

<!-- TX Region -->
<rect x="12" y="12" width="700" height="600" rx="4"
  class="layer-border-tx" stroke-width="1" fill="rgba(0,180,216,0.025)"/>
<text x="26" y="26" class="section-label" fill="rgba(0,180,216,0.5)">TX PATH →</text>

<!-- RX Region -->
<rect x="12" y="630" width="700" height="370" rx="4"
  class="layer-border-rx" stroke-width="1" fill="rgba(230,57,70,0.025)"/>
<text x="26" y="644" class="section-label" fill="rgba(230,57,70,0.5)">← RX PATH</text>

<!-- Support Region -->
<rect x="730" y="12" width="758" height="998" rx="4"
  class="layer-border-sup" stroke-width="1" fill="rgba(82,183,136,0.015)"/>
<text x="744" y="26" class="section-label" fill="rgba(82,183,136,0.5)">SUPPORT / SHARED</text>

<!-- External boundaries -->
<rect x="12" y="820" width="700" height="190" rx="3"
  stroke="rgba(100,100,100,0.2)" fill="rgba(255,255,255,0.01)" stroke-width="1"/>
<text x="26" y="834" class="section-label" fill="rgba(100,100,100,0.35)">LAYER BOUNDARIES</text>

    note:"Computes 32-bit End-to-End CRC over header+data. TL responsibility — survives across multiple fabric hops. Checker validates on RX side.",
    ins:[["tlp_tx[1151:0]","1152b"],["tlp_tx_valid","1b"],["tlp_rx[1151:0]","1152b"],["tlp_rx_valid","1b"],["ecrc_en","1b"],["clk/rst_n","–"]],
    outs:[["tlp_ecrc_tx[1183:0]","1184b"],["tlp_ecrc_valid","1b"],["ecrc_rx_ok","1b"],["ecrc_rx_err","1b"]],
    flows:["← tlp_tx ← PFX","← ecrc_en ← CFG","→ tlp_ecrc_tx → TLP_ASM","→ ecrc_rx_ok → RX_RTR","→ ecrc_rx_err → AER"]
  },
  TLP_ASM: {
    name:"TLP Assembler / Packet Builder", tag:"TLP_ASM", layer:"tx",
    note:"Assembles the final TLP: header (3 or 4 DW) + optional ECRC + data payload. Respects max_payload from CFG. Outputs complete TLP word.",
    ins:[["arb_tlp_in[575:0]","576b"],["arb_tlp_valid","1b"],["prefix_in[127:0]","128b"],["prefix_valid","1b"],["ecrc_in[31:0]","32b"],["credit_ok","1b"],["max_payload[2:0]","3b"],["clk/rst_n","–"]],
    outs:[["tlp_out[1023:0]","1024b"],["tlp_valid","1b"],["tlp_sop","1b"],["tlp_eop","1b"],["tlp_hdr[127:0]","128b"],["tlp_be[127:0]","128b"]],
    flows:["← arb_tlp ← ARB_TX","← max_payload ← CFG","→ tlp_out → FLIT"]
  },
  FLIT: {
    name:"FLIT Mode Controller", tag:"FLIT", layer:"tx", gen6:true,
    note:"Gen6 MANDATORY. Packs TLPs + DLLPs into 256-byte FLITs with 24-bit CRC and 12-bit sequence number. Zero encoding overhead vs 128b/130b.",
    ins:[["tlp_in[1023:0]","1024b"],["tlp_valid_in","1b"],["flit_mode_en","1b"],["dll_flit_ack","1b"],["clk/rst_n","–"]],
    outs:[["flit_out[2047:0]","2048b"],["flit_valid","1b"],["flit_crc[23:0]","24b"],["flit_seq[11:0]","12b"],["flit_retry_req","1b"],["flit_overflow_err","1b"]],
    flows:["← tlp_in ← TLP_ASM","← flit_mode_en ← CFG","→ flit_out → DLL_IF"]
  },
  DLL_IF: {
    name:"DLL Interface (Boundary)", tag:"DLL_IF", layer:"tx",
    note:"Hard TL/DLL boundary. In Gen6 full 256B FLITs cross in both directions. Also receives FC credit updates and ACK/NAK from DLL.",
    ins:[["flit_in[2047:0]","2048b"],["flit_valid_in","1b"],["dll_ack","1b"],["dll_nak","1b"],["dll_up","1b"],["cr_update[71:0]","72b"],["cr_update_valid","1b"],["clk/rst_n","–"]],
    outs:[["tlp_rx_out[1023:0]","1024b"],["tlp_rx_valid","1b"],["flit_to_dll[2047:0]","2048b"],["flit_to_dll_valid","1b"],["dll_ready","1b"]],
    flows:["← flit_in ← FLIT","→ flit_to_dll → [DLL Layer]","← cr_update from DLL → CR_MGR","← tlp_rx_out from DLL → HDR_PARSE (RX)"]
  },
  HDR_PARSE: {
    name:"TLP Header Parser (RX)", tag:"HDR_PARSE", layer:"rx", gen6:true,
    note:"First RX block after DLL boundary. Decodes ALL TLP header fields from the raw received word. Output drives everything downstream.",
    ins:[["tlp_rx[1023:0]","1024b"],["tlp_rx_valid","1b"],["tlp_rx_sop","1b"],["clk/rst_n","–"]],
    outs:[["tlp_type[4:0]","5b"],["tlp_fmt[2:0]","3b"],["tlp_tc[2:0]","3b"],["tlp_attr[2:0]","3b"],["tlp_len[9:0]","10b"],["tlp_tag[9:0]","10b"],["tlp_req_id[15:0]","16b"],["tlp_addr[63:0]","64b"],["tlp_ep_bit","1b"],["tlp_td_bit","1b"],["parse_err","1b"],["parse_valid","1b"]],
    flows:["← tlp_rx ← DLL_IF (from DLL)","→ tlp_type → MAL_CHK","→ tlp_type → RX_RTR","→ parse_err → AER"]
  },
  MAL_CHK: {
    name:"TLP Malformed Checker", tag:"MAL_CHK", layer:"rx", gen6:true,
    note:"Validates all header fields for spec compliance. Checks reserved fields, invalid length for type, illegal byte enables. Error → TLP dropped + AER.",
    ins:[["tlp_type[4:0]","5b"],["tlp_fmt[2:0]","3b"],["tlp_len[9:0]","10b"],["tlp_first_be[3:0]","4b"],["tlp_last_be[3:0]","4b"],["parse_valid","1b"],["clk/rst_n","–"]],
    outs:[["malformed_err","1b"],["malformed_type[3:0]","4b"],["tlp_ok","1b"]],
    flows:["← tlp_type ← HDR_PARSE","→ tlp_ok → PSND","→ malformed_err → AER"]
  },
  PSND: {
    name:"Poisoned TLP Handler", tag:"PSND", layer:"rx", gen6:true,
    note:"EP (Error Poison) bit set means the data payload is corrupt. Logs to AER and signals user logic. Data is NOT forwarded upstream.",
    ins:[["tlp_ep_bit","1b"],["tlp_type[4:0]","5b"],["tlp_ok","1b"],["tlp_rx[1023:0]","1024b"],["clk/rst_n","–"]],
    outs:[["poisoned_detected","1b"],["poison_drop","1b"],["poison_to_aer[2:0]","3b"],["tlp_fwd_valid","1b"]],
    flows:["← tlp_ok ← MAL_CHK","→ tlp_fwd_valid → RX_RTR","→ poison_to_aer → AER"]
  },
  RX_RTR: {
    name:"RX TLP Router / MUX", tag:"RX_RTR", layer:"rx", gen6:true,
    note:"Routes validated TLP to the correct handler based on type field. Cpl→CPL_HDL, MWr→MWR_HDL, Cfg→CFG, Msg→MSG_HDL, AtomicOp→ATOP.",
    ins:[["tlp_type[4:0]","5b"],["tlp_fwd_valid","1b"],["tlp_rx[1023:0]","1024b"],["ecrc_ok","1b"],["clk/rst_n","–"]],
    outs:[["to_cpl_valid","1b"],["to_mwr_valid","1b"],["to_cfg_valid","1b"],["to_msg_valid","1b"],["to_atomic_valid","1b"],["routed_tlp[1023:0]","1024b"]],
    flows:["← tlp_fwd_valid ← PSND","← ecrc_ok ← ECRC","→ routed_tlp → CPL_HDL","→ routed_tlp → MWR_HDL","→ routed_tlp → MSG_HDL","→ routed_tlp → ATOP","→ to_cfg_valid → CFG"]
  },
  CPL_HDL: {
    name:"Completion Handler", tag:"CPL_HDL", layer:"rx",
    note:"Matches inbound completion TLPs to outstanding non-posted requests via 10-bit tag. Returns data and status to User Logic. Releases tag.",
    ins:[["tlp_cpl[1023:0]","1024b"],["tlp_cpl_valid","1b"],["outstanding_tag[9:0]","10b"],["expected_len[9:0]","10b"],["clk/rst_n","–"]],
    outs:[["cpl_data[511:0]","512b"],["cpl_valid","1b"],["cpl_tag[9:0]","10b"],["cpl_status[2:0]","3b"],["cpl_match_err","1b"],["tag_return[9:0]","10b"],["tag_return_valid","1b"],["cr_return_cplh","1b"],["cr_return_cpld[3:0]","4b"]],
    flows:["← tlp_cpl ← RX_RTR","→ cpl_data → CPL_Q","→ tag_return → TAG_MGR","→ cr_return_cplh/cpld → CR_MGR"]
  },
  CPL_Q: {
    name:"Completion Queue", tag:"CPL_Q", layer:"rx",
    note:"Buffers inbound completion TLPs before final delivery to User Logic Interface. Gated by credit availability.",
    ins:[["cpl_tlp[1023:0]","1024b"],["cpl_valid_in","1b"],["credit_grant_cpl","1b"],["clk/rst_n","–"]],
    outs:[["cpl_out[1023:0]","1024b"],["cpl_valid_out","1b"],["q_full_cpl","1b"],["q_occ_cpl[7:0]","8b"]],
    flows:["← cpl_tlp ← CPL_HDL","← credit_grant_cpl ← CR_MGR","→ cpl_out → USR_IF"]
  },
  MWR_HDL: {
    name:"Posted Write Handler (MWr RX)", tag:"MWR_HDL", layer:"rx", gen6:true,
    note:"Handles inbound MWr TLPs (posted — no completion returned). Delivers write data and target address to User Logic.",
    ins:[["tlp_mwr[1023:0]","1024b"],["tlp_mwr_valid","1b"],["tlp_addr[63:0]","64b"],["tlp_len[9:0]","10b"],["clk/rst_n","–"]],
    outs:[["mwr_data[511:0]","512b"],["mwr_addr[63:0]","64b"],["mwr_be[63:0]","64b"],["mwr_valid","1b"],["mwr_full","1b"]],
    flows:["← tlp_mwr ← RX_RTR","→ mwr_data+addr → USR_IF"]
  },
  MSG_HDL: {
    name:"Message Handler", tag:"MSG_HDL", layer:"rx", gen6:true,
    note:"Handles all PCIe message types: INTx assert/deassert, PME, ERR_COR/NONFATAL/FATAL, Vendor-Defined Messages (VDM), Slot Power Limit.",
    ins:[["tlp_msg[1023:0]","1024b"],["tlp_msg_valid","1b"],["msg_code[7:0]","8b"],["clk/rst_n","–"]],
    outs:[["intx_assert[3:0]","4b"],["intx_deassert[3:0]","4b"],["pme_msg","1b"],["err_msg_type[2:0]","3b"],["err_msg_valid","1b"],["vdm_data[511:0]","512b"],["vdm_valid","1b"],["msg_to_aer","1b"]],
    flows:["← tlp_msg ← RX_RTR","→ intx_assert → USR_IF","→ pme_msg → USR_IF","→ msg_to_aer → AER"]
  },
  ATOP: {
    name:"Atomic Operation Handler", tag:"ATOP", layer:"rx", gen6:true,
    note:"FetchAdd, Swap, CAS AtomicOp TLPs (PCIe 3.0+). Executes atomic read-modify-write against local memory, generates Completion with original data.",
    ins:[["tlp_atomic[1023:0]","1024b"],["tlp_atomic_valid","1b"],["atomic_type[1:0]","2b"],["atomic_addr[63:0]","64b"],["atomic_operand[63:0]","64b"],["clk/rst_n","–"]],
    outs:[["atop_rd_addr[63:0]","64b"],["atop_wr_data[63:0]","64b"],["atop_wr_en","1b"],["atop_cpl_data[63:0]","64b"],["atop_cpl_valid","1b"],["atop_tag[9:0]","10b"]],
    flows:["← tlp_atomic ← RX_RTR","→ atop_cpl_data → CPL_HDL (completion back to requester)"]
  },
  CFG: {
    name:"Config Space Handler", tag:"CFG", layer:"sup",
    note:"Implements PCIe config space registers. Broadcasts configuration bits to all dependent modules. Handles CfgRd/CfgWr TLPs and generates completions.",
    ins:[["tlp_cfg[255:0]","256b"],["tlp_cfg_valid","1b"],["cfg_addr[11:0]","12b"],["cfg_wr_data[31:0]","32b"],["cfg_wr_en","1b"],["clk/rst_n","–"]],
    outs:[["cfg_rd_data[31:0]","32b"],["cfg_rd_valid","1b"],["cfg_cpl_tlp[255:0]","256b"],["cfg_cpl_valid","1b"],["max_payload[2:0]","3b"],["flit_mode_en","1b"],["ecrc_en","1b"],["ro_en","1b"]],
    flows:["← tlp_cfg ← RX_RTR","→ max_payload → TLP_ASM","→ flit_mode_en → FLIT","→ ecrc_en → ECRC","→ ro_en → ORD"]
  },
  TMO_ERR: {
    name:"Timeout / Error Manager", tag:"TMO_ERR", layer:"sup",
    note:"Monitors all outstanding non-posted tag timers. Completion Timeout → AER + tag released. Tracks multiple simultaneous outstanding requests.",
    ins:[["tag_start[9:0]","10b"],["tag_start_valid","1b"],["tag_return_valid","1b"],["tag_returned[9:0]","10b"],["timeout_limit[15:0]","16b"],["clk/rst_n","–"]],
    outs:[["timeout_tag[9:0]","10b"],["timeout_valid","1b"],["cpl_timeout_err","1b"],["err_to_aer[3:0]","4b"]],
    flows:["← tag_start ← TAG_MGR","← tag_return ← CPL_HDL","→ timeout_tag → TAG_MGR (release)","→ err_to_aer → AER"]
  },
  AER: {
    name:"AER / Error Logger", tag:"AER", layer:"sup", gen6:true,
    note:"Aggregates ALL TL+DLL errors into PCIe AER registers. Generates ERR_COR, ERR_NONFATAL, ERR_FATAL message TLPs upstream. DLL cannot generate TLPs — DLL_ERR passes up here.",
    ins:[["err_from_tmo[3:0]","4b"],["err_from_cpl[3:0]","4b"],["err_from_mal","1b"],["err_from_psnd","1b"],["err_from_msg","1b"],["err_from_flit","1b"],["dll_err[3:0]","4b"],["err_severity[1:0]","2b"],["clk/rst_n","–"]],
    outs:[["aer_status[31:0]","32b"],["aer_mask[31:0]","32b"],["aer_int","1b"],["err_msg_tlp[255:0]","256b"],["err_msg_valid","1b"]],
    flows:["← err_from_mal ← MAL_CHK","← err_from_psnd ← PSND","← err_from_msg ← MSG_HDL","← err_from_tmo ← TMO_ERR","← dll_err ← DLL_ERR (DLL layer)","→ err_msg_tlp → TX path (upstream error reporting)"]
  }
};

function showDetail(tag) {
  const m = MODULES[tag];
  if (!m) return;
  const panel = document.getElementById('detail-panel');
  const colors = {tx:'#00b4d8', rx:'#e63946', sup:'#52b788'};
  const col = colors[m.layer] || '#888';
  panel.style.borderLeftColor = col;
  document.getElementById('dp-name').textContent = m.name;
  document.getElementById('dp-tag').textContent = m.tag + ' · ' + m.layer.toUpperCase();
  document.getElementById('dp-tag').style.color = col;
  let badges = `<span class="dp-badge" style="color:${col};border-color:${col}">${m.layer.toUpperCase()} PATH</span>`;
  if (m.gen6) badges += `<span class="dp-badge" style="color:#ffd60a;border-color:#ffd60a">★ GEN6</span>`;
  document.getElementById('dp-badges').innerHTML = badges;
  document.getElementById('dp-note').textContent = m.note;
  document.getElementById('dp-ins').innerHTML = m.ins.map(([s,b])=>
    `<div class="io-entry io-in-marker"><span class="io-sig">▶ ${s}</span><span class="io-bits">${b}</span></div>`
  ).join('');
  document.getElementById('dp-outs').innerHTML = m.outs.map(([s,b])=>
    `<div class="io-entry io-out-marker"><span class="io-sig">◀ ${s}</span><span class="io-bits">${b}</span></div>`
  ).join('');
  document.getElementById('dp-flows').innerHTML = (m.flows||[]).map(f=>
    `<div class="flow-entry">${f}</div>`
  ).join('');
  panel.classList.add('open');
  // Highlight box
  document.querySelectorAll('.mod-box').forEach(b => b.style.opacity='0.35');
  const el = document.getElementById('box-'+tag);
  if (el) el.style.opacity = '1';
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  resetHighlight();
}

function resetHighlight() {
  document.querySelectorAll('.mod-box').forEach(b => b.style.opacity='1');
}

function toggleWires(type, btn) {
  document.querySelectorAll('.ctrl-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const wires = document.querySelectorAll('.wire');
  if (type === 'all') {
    wires.forEach(w => w.style.opacity='1');
  } else {
    wires.forEach(w => {
      const dt = w.dataset.type;
      w.style.opacity = (dt === type) ? '1' : '0.06';
    });
  }
}
</script>
